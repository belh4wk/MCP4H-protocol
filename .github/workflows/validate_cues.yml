name: Validate MCP4H Cues

on:
  push:
    paths:
      - 'spec/**'
      - 'schemas/**'
      - 'examples/messages/**'
      - 'examples_cues/**'
      - 'tools/sync_examples.py'
      - 'examples/_sync_map.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'spec/**'
      - 'schemas/**'
      - 'examples/messages/**'
      - 'examples_cues/**'
      - 'tools/sync_examples.py'
      - 'examples/_sync_map.json'
      - '.github/workflows/**'

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: |
          python3 -m pip install --upgrade pip >/dev/null
          python3 -m pip install "jsonschema>=4.18" >/dev/null

      - name: Check example sync
        run: python3 tools/sync_examples.py --check

      - name: Validate cue examples against schema
        run: python3 tests/interop/test_schema.py
