services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mcp4h-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  cue-gateway:
    build:
      context: .
      dockerfile: services/cue-gateway/Dockerfile
    image: mcp4h-protocol-cue-gateway:latest
    container_name: mcp4h-cue-gateway
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
    depends_on:
      - mqtt
    ports:
      - "8080:8080"


  cue-router:
    build:
      context: .
      dockerfile: services/cue-router/Dockerfile
    image: mcp4h-protocol-cue-router:latest
    container_name: mcp4h-cue-router
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - CUE_ROUTER_POLICY=/app/bridges/cue-router/policy.yaml
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      - mqtt
    volumes:
      - ./bridges/cue-router/policy.yaml:/app/bridges/cue-router/policy.yaml:ro
    ports:
      - "8090:8090"

  udp-proxy:
    build:
      context: .
      dockerfile: services/udp-proxy/Dockerfile
    image: mcp4h-protocol-udp-proxy:latest
    container_name: mcp4h-udp-proxy
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
    depends_on:
      - mqtt

  osc-bridge:
    build:
      context: .
      dockerfile: services/osc-bridge/Dockerfile
    image: mcp4h-protocol-osc-bridge:latest
    container_name: mcp4h-osc-bridge
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
    depends_on:
      - mqtt

  simhub-adapter:
    build:
      context: .
      dockerfile: services/simhub-adapter/Dockerfile
    image: mcp4h-protocol-simhub-adapter:latest
    container_name: mcp4h-simhub-adapter
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
    depends_on:
      - mqtt

  voice-coach:
    build:
      context: .
      dockerfile: services/voice-coach/Dockerfile
    image: mcp4h-protocol-voice-coach:latest
    container_name: mcp4h-voice-coach
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
    depends_on:
      - mqtt
